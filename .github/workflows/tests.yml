name: tests
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            install: sudo apt-get update && sudo apt-get install -y libfido2-dev libpcsclite-dev
          - os: macos-15
            install: brew install libfido2 openssl@3
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: 1.25.x
      - name: install dependencies
        run: ${{ matrix.install }}
      - name: download go mods
        run: go mod download
      - name: run go tests
        env:
          # Our own pkg/provider/fido2/fido2_init.go does `#include <fido.h>`
          # and has no #cgo directives, so it relies on env flags or default
          # system include paths. On macOS, libfido2 lives under Homebrew.
          CGO_CFLAGS: ${{ startsWith(matrix.os, 'macos') && '-I/opt/homebrew/opt/libfido2/include -I/opt/homebrew/opt/openssl@3/include -I/usr/local/opt/libfido2/include -I/usr/local/opt/openssl@3/include' || '' }}
          CGO_LDFLAGS: ${{ startsWith(matrix.os, 'macos') && '-L/opt/homebrew/opt/libfido2/lib -L/opt/homebrew/opt/openssl@3/lib -L/usr/local/opt/libfido2/lib -L/usr/local/opt/openssl@3/lib -lfido2' || '' }}
        run: go test -timeout 5m ./...
