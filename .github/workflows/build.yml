name: build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # We don't use `container:` here. JavaScript actions (checkout/setup-go/
    # upload-artifact) don't run in Alpine containers on ARM64 runners.
    # Instead we run actions natively on Ubuntu and invoke Alpine via
    # `docker run` only for the build step itself.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi
      - name: build inside Alpine
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -v "$GITHUB_WORKSPACE/dist:/out" \
            -e SRC_DIR=/src \
            -e OUT_PATH=/out/cryptkey-linux-${{ matrix.goarch }} \
            -e VERSION="${{ steps.version.outputs.version }}" \
            -e REF_NAME="${{ github.ref_name }}" \
            -e COMMIT_SHA="${{ github.sha }}" \
            golang:1.25-alpine \
            /src/scripts/build-linux-static.sh
      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: cryptkey-linux-${{ matrix.goarch }}
          path: dist/cryptkey-linux-${{ matrix.goarch }}
          if-no-files-found: error

  build-darwin:
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: macos-15-intel
          - goarch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    env:
      STATIC_PREFIX: ${{ github.workspace }}/static-deps
      LIBCBOR_VERSION: "0.12.0"
      LIBFIDO2_VERSION: "1.17.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: 1.25.x
      - name: install build dependencies
        run: brew install cmake pkgconf openssl@3
      - name: build static libcbor
        run: |
          git clone --depth 1 --branch "v${LIBCBOR_VERSION}" https://github.com/PJK/libcbor.git /tmp/libcbor
          cd /tmp/libcbor
          cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="${STATIC_PREFIX}" \
            -DWITH_EXAMPLES=OFF .
          make -j"$(sysctl -n hw.ncpu)"
          make install
      - name: build static libfido2
        run: |
          git clone --depth 1 --branch "${LIBFIDO2_VERSION}" https://github.com/Yubico/libfido2.git /tmp/libfido2
          cd /tmp/libfido2
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          # libfido2's CMakeLists defines separate fido2_shared/fido2_static
          # targets. BUILD_STATIC_LIBS=ON enables the static one.
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON \
            -DBUILD_MANPAGES=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TOOLS=OFF \
            -DCMAKE_PREFIX_PATH="${STATIC_PREFIX};${OPENSSL_PREFIX}" \
            -DCMAKE_INSTALL_PREFIX="${STATIC_PREFIX}" .
          make -j"$(sysctl -n hw.ncpu)"
          make install
      - name: set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi
      - name: build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          export CGO_CFLAGS="-I${STATIC_PREFIX}/include -I${OPENSSL_PREFIX}/include"
          export CGO_LDFLAGS="-framework CoreFoundation -framework IOKit ${STATIC_PREFIX}/lib/libfido2.a ${STATIC_PREFIX}/lib/libcbor.a ${OPENSSL_PREFIX}/lib/libcrypto.a"
          go build -trimpath -tags dynamic \
            -ldflags "-s -w \
              -X 'github.com/ekristen/cryptkey/pkg/common.SUMMARY=${{ steps.version.outputs.version }}' \
              -X 'github.com/ekristen/cryptkey/pkg/common.BRANCH=${{ github.ref_name }}' \
              -X 'github.com/ekristen/cryptkey/pkg/common.VERSION=${{ steps.version.outputs.version }}' \
              -X 'github.com/ekristen/cryptkey/pkg/common.COMMIT=${{ github.sha }}'" \
            -o dist/cryptkey-darwin-${{ matrix.goarch }} .
      - name: verify static binary
        run: ./scripts/verify-static.sh dist/cryptkey-darwin-${{ matrix.goarch }}
      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: cryptkey-darwin-${{ matrix.goarch }}
          path: dist/cryptkey-darwin-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: generate-token
        id: generate_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # ratchet:tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.BOT2_APP_ID }}
          private_key: ${{ secrets.BOT2_APP_PEM }}

      - name: install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # ratchet:sigstore/cosign-installer@v4.1.1

      - name: install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # ratchet:anchore/sbom-action/download-syft@v0.24.0

      - name: install quill
        env:
          QUILL_VERSION: 0.4.1
        run: |
          curl -Lo /tmp/quill_${QUILL_VERSION}_linux_amd64.tar.gz https://github.com/anchore/quill/releases/download/v${QUILL_VERSION}/quill_${QUILL_VERSION}_linux_amd64.tar.gz
          tar -xvf /tmp/quill_${QUILL_VERSION}_linux_amd64.tar.gz -C /tmp
          mv /tmp/quill /usr/local/bin/quill
          chmod +x /usr/local/bin/quill

      - name: setup quill
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # ratchet:1password/load-secrets-action@v4.0.0
        if: github.actor == github.repository_owner || github.actor == 'ekristen-dev[bot]'
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          QUILL_NOTARY_KEY: ${{ secrets.OP_QUILL_NOTARY_KEY }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.OP_QUILL_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.OP_QUILL_NOTARY_ISSUER }}
          QUILL_SIGN_PASSWORD: ${{ secrets.OP_QUILL_SIGN_PASSWORD }}
          QUILL_SIGN_P12: ${{ secrets.OP_QUILL_SIGN_P12 }}

      - name: download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          path: artifacts/

      - name: sign darwin binaries
        run: |
          for arch in amd64 arm64; do
            quill sign-and-notarize "artifacts/cryptkey-darwin-${arch}/cryptkey-darwin-${arch}" -vv
          done

      - name: package release archives
        run: |
          mkdir -p release/
          version="${GITHUB_REF#refs/tags/}"

          # Each binary is wrapped in its own tar.gz so the extracted file
          # is just `cryptkey` regardless of which platform was downloaded.
          for os in linux darwin; do
            for arch in amd64 arm64; do
              cp "artifacts/cryptkey-${os}-${arch}/cryptkey-${os}-${arch}" cryptkey
              chmod +x cryptkey
              tar czf "release/cryptkey-${version}-${os}-${arch}.tar.gz" cryptkey
              rm cryptkey
            done
          done

      - name: generate SBOMs
        run: |
          # One CycloneDX JSON SBOM per archive. syft catalogs the Go binary
          # inside the archive via its embedded module information (available
          # because the static build doesn't strip it) plus the archive
          # contents themselves. Naming matches goreleaser / distillery:
          # <archive>.sbom.json next to each <archive>.
          for archive in release/cryptkey-*.tar.gz; do
            syft "${archive}" -o cyclonedx-json="${archive}.sbom.json"
          done

      - name: generate checksums
        run: |
          # checksums.txt covers every archive AND every SBOM. The cosign
          # signature files (.sig / .pem) are NOT in here — they're
          # verified directly via cosign, not by sha256.
          cd release/
          sha256sum cryptkey-*.tar.gz cryptkey-*.sbom.json > checksums.txt

      - name: sign checksums with cosign
        run: |
          # Keyless signing via GitHub Actions OIDC → Fulcio → Rekor. The
          # resulting .sig + .pem pair lets anyone verify the checksums
          # file came from this workflow against this repo, without us
          # maintaining a long-lived signing key. Individual SBOMs
          # inherit trust transitively through checksums.txt — they are
          # NOT signed separately (see docs/development/release-verification.md).
          cosign sign-blob \
            --yes \
            --oidc-provider=github \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --output-signature=release/checksums.txt.sig \
            --output-certificate=release/checksums.txt.pem \
            release/checksums.txt

      - name: upload release assets
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          version="${GITHUB_REF#refs/tags/}"
          gh release upload "${version}" release/* --clobber

  snapshot:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          path: artifacts/
      - name: list artifacts
        run: find artifacts/ -type f | sort
      - name: upload combined artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: cryptkey-snapshot-all
          path: artifacts/
